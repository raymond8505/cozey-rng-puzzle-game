name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker build
        run: docker build .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            DEPLOY_PATH="/home/puzzle"
            REPO_URL="https://github.com/raymond8505/cozey-rng-puzzle-game.git"

            if [ -d "${DEPLOY_PATH}/.git" ]; then
              # Existing git repo — fetch and force-reset to latest main
              cd "${DEPLOY_PATH}"
              git remote set-url origin "${REPO_URL}"
              git fetch origin main
              git reset --hard origin/main
            elif [ -d "${DEPLOY_PATH}" ]; then
              # Directory exists but isn't a git repo
              cd "${DEPLOY_PATH}"
              git init
              git remote add origin "${REPO_URL}"
              git fetch origin
              git checkout -f -B main origin/main
            else
              # Fresh clone
              git clone "${REPO_URL}" "${DEPLOY_PATH}"
              cd "${DEPLOY_PATH}"
            fi

            docker compose up -d --build --remove-orphans

            # Health check — wait up to 60s for the container to respond
            echo "Waiting for container..."
            for i in $(seq 1 12); do
              docker exec puzzle wget -q --spider http://localhost/ && \
                echo "Health check passed!" && break || true
              if [ "$i" = "12" ]; then
                echo "Health check failed after 60s — recent logs:"
                docker logs --tail 50 puzzle
                exit 1
              fi
              sleep 5
            done

            # Clean up dangling images after build
            docker image prune -f
